        add_by_users_id: { type: integer }
        mark_types: { type: string }
        mark_scale_group_edu_id: { type: integer }
        is_system: { type: integer }
        is_default: { type: integer }
        action: { type: string, enum: [I, U, D] }

    MarkDivisionGroup:
      type: object
