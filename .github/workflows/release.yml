name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
      build_number: ${{ steps.extract.outputs.build_number }}
    steps:
      - name: Extract version from tag
        id: extract
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION="${TAG}"
          BUILD_NUMBER="$(echo "$TAG" | tr -d '.' | head -c 8)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"

  build-web:
    runs-on: ubuntu-latest
    needs: version
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          cache: true

      - run: flutter pub get
      - run: flutter build web --base-href /bsharp/ --build-name=${{ needs.version.outputs.version }}

      - uses: actions/upload-artifact@v4
        with:
          name: release-web
          path: build/web

  build-android:
    runs-on: ubuntu-latest
    needs: version
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          cache: true

      - run: flutter pub get

      - name: Configure signing
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.jks
          cat > android/key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=app/release.jks
          EOF

      - name: Build APK
        run: flutter build apk --release --build-name=${{ needs.version.outputs.version }} --build-number=${{ needs.version.outputs.build_number }}

      - name: Build AAB
        run: flutter build appbundle --release --build-name=${{ needs.version.outputs.version }} --build-number=${{ needs.version.outputs.build_number }}

      - uses: actions/upload-artifact@v4
        with:
          name: release-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - uses: actions/upload-artifact@v4
        with:
          name: release-android-aab
          path: build/app/outputs/bundle/release/app-release.aab

  build-ios:
    runs-on: macos-latest
    needs: version
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          cache: true

      - run: flutter pub get
      - run: flutter build ios --release --no-codesign --build-name=${{ needs.version.outputs.version }} --build-number=${{ needs.version.outputs.build_number }}

      - uses: actions/upload-artifact@v4
        with:
          name: release-ios
          path: build/ios/iphoneos/Runner.app

  build-wearos:
    runs-on: ubuntu-latest
    needs: version
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          cache: true

      - run: flutter pub get

      - name: Configure signing
        env:
          WEAR_KEYSTORE_BASE64: ${{ secrets.WEAR_KEYSTORE_BASE64 }}
          WEAR_KEY_ALIAS: ${{ secrets.WEAR_KEY_ALIAS }}
          WEAR_KEY_PASSWORD: ${{ secrets.WEAR_KEY_PASSWORD }}
          WEAR_STORE_PASSWORD: ${{ secrets.WEAR_STORE_PASSWORD }}
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        if: env.WEAR_KEYSTORE_BASE64 != '' || env.KEYSTORE_BASE64 != ''
        run: |
          if [ -n "$WEAR_KEYSTORE_BASE64" ]; then
            echo "$WEAR_KEYSTORE_BASE64" | base64 -d > android/app/release.jks
            cat > android/key.properties <<EOF
          storePassword=$WEAR_STORE_PASSWORD
          keyPassword=$WEAR_KEY_PASSWORD
          keyAlias=$WEAR_KEY_ALIAS
          storeFile=app/release.jks
          EOF
          else
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.jks
            cat > android/key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=app/release.jks
          EOF
          fi

      - name: Build WearOS APK
        run: flutter build apk --release --target=lib/main_wear.dart --build-name=${{ needs.version.outputs.version }} --build-number=${{ needs.version.outputs.build_number }}

      - uses: actions/upload-artifact@v4
        with:
          name: release-wearos-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  create-release:
    runs-on: ubuntu-latest
    needs: [version, build-web, build-android, build-ios, build-wearos]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package artifacts
        run: |
          cd artifacts
          mv release-android-apk/app-release.apk bsharp-${{ needs.version.outputs.version }}.apk
          mv release-android-aab/app-release.aab bsharp-${{ needs.version.outputs.version }}.aab
          mv release-wearos-apk/app-release.apk bsharp-wear-${{ needs.version.outputs.version }}.apk
          tar -czf bsharp-web-${{ needs.version.outputs.version }}.tar.gz -C release-web .
          tar -czf bsharp-ios-${{ needs.version.outputs.version }}.tar.gz -C release-ios .

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log "$PREV_TAG"..HEAD --pretty=format:"- %s" --no-merges)
          else
            CHANGES=$(git log --pretty=format:"- %s" --no-merges -20)
          fi
          {
            echo "changes<<EOF"
            echo "$CHANGES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: BSharp v${{ needs.version.outputs.version }}
          body: |
            ## BSharp v${{ needs.version.outputs.version }}

            ### Changes
            ${{ steps.changelog.outputs.changes }}

            ### Downloads
            - **Android APK** - `bsharp-${{ needs.version.outputs.version }}.apk`
            - **Android AAB** - `bsharp-${{ needs.version.outputs.version }}.aab` (Play Store)
            - **WearOS APK** - `bsharp-wear-${{ needs.version.outputs.version }}.apk`
            - **Web** - `bsharp-web-${{ needs.version.outputs.version }}.tar.gz`
            - **iOS** - `bsharp-ios-${{ needs.version.outputs.version }}.tar.gz` (unsigned)
          files: |
            artifacts/bsharp-${{ needs.version.outputs.version }}.apk
            artifacts/bsharp-${{ needs.version.outputs.version }}.aab
            artifacts/bsharp-wear-${{ needs.version.outputs.version }}.apk
            artifacts/bsharp-web-${{ needs.version.outputs.version }}.tar.gz
            artifacts/bsharp-ios-${{ needs.version.outputs.version }}.tar.gz
          generate_release_notes: true

  deploy-pages:
    needs: build-web
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-web
          path: web-build

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web-build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
