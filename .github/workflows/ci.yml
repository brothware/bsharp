name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          cache: true

      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: dart run slang

      - name: Archive generated files
        run: find lib -name '*.g.dart' -o -name '*.freezed.dart' | tar -czf generated-sources.tar.gz -T -

      - uses: actions/upload-artifact@v4
        with:
          name: generated-sources
          path: generated-sources.tar.gz
          retention-days: 1

      - run: dart format --set-exit-if-changed .
      - run: flutter analyze --fatal-warnings

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage/lcov.info ]; then
            LINES=$(grep -c "^DA:" coverage/lcov.info || true)
            HIT=$(grep "^DA:" coverage/lcov.info | grep -cv ",0$" || true)
            if [ "$LINES" -gt 0 ]; then
              PCT=$((HIT * 100 / LINES))
              echo "### Test Coverage: ${PCT}%" >> "$GITHUB_STEP_SUMMARY"
              echo "${HIT}/${LINES} lines covered" >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/lcov.info

  build-web:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          cache: true

      - run: flutter pub get

      - uses: actions/download-artifact@v4
        with:
          name: generated-sources

      - run: tar -xzf generated-sources.tar.gz

      - run: flutter build web --base-href /bsharp/

      - uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web

  build-android:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: 'gradle'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          cache: true

      - run: flutter pub get

      - uses: actions/download-artifact@v4
        with:
          name: generated-sources

      - run: tar -xzf generated-sources.tar.gz

      - name: Configure signing
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.jks
          cat > android/key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=release.jks
          EOF

      - run: flutter build apk --flavor phone --release
      - run: flutter build appbundle --flavor phone --release

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-phone-release.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: build/app/outputs/bundle/phoneRelease/app-phone-release.aab

  build-ios:
    runs-on: macos-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          cache: true

      - uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}

      - run: flutter pub get

      - uses: actions/download-artifact@v4
        with:
          name: generated-sources

      - run: tar -xzf generated-sources.tar.gz

      - run: flutter build ios --release --no-codesign

      - uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: build/ios/iphoneos/Runner.app

  build-wearos:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: 'gradle'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          cache: true

      - run: flutter pub get

      - uses: actions/download-artifact@v4
        with:
          name: generated-sources

      - run: tar -xzf generated-sources.tar.gz

      - name: Configure signing
        env:
          WEAR_KEYSTORE_BASE64: ${{ secrets.WEAR_KEYSTORE_BASE64 }}
          WEAR_KEY_ALIAS: ${{ secrets.WEAR_KEY_ALIAS }}
          WEAR_KEY_PASSWORD: ${{ secrets.WEAR_KEY_PASSWORD }}
          WEAR_STORE_PASSWORD: ${{ secrets.WEAR_STORE_PASSWORD }}
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        if: env.WEAR_KEYSTORE_BASE64 != '' || env.KEYSTORE_BASE64 != ''
        run: |
          if [ -n "$WEAR_KEYSTORE_BASE64" ]; then
            echo "$WEAR_KEYSTORE_BASE64" | base64 -d > android/app/release.jks
            cat > android/key.properties <<EOF
          storePassword=$WEAR_STORE_PASSWORD
          keyPassword=$WEAR_KEY_PASSWORD
          keyAlias=$WEAR_KEY_ALIAS
          storeFile=release.jks
          EOF
          else
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.jks
            cat > android/key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=release.jks
          EOF
          fi

      - run: flutter build apk --flavor wear --release --target=lib/main_wear.dart

      - uses: actions/upload-artifact@v4
        with:
          name: wearos-apk
          path: build/app/outputs/flutter-apk/app-wear-release.apk

  deploy-pages:
    if: github.event_name == 'push'
    needs: build-web
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: web-build
          path: web-build

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web-build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
