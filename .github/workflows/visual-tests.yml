name: Visual Tests

on:
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      update_goldens:
        description: Regenerate golden files
        type: boolean
        default: false

concurrency:
  group: visual-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          cache: true

      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: dart run slang
      - run: dart format lib/l10n/

      - name: Archive generated files
        run: find lib -name '*.g.dart' -o -name '*.freezed.dart' | tar -czf generated-sources.tar.gz -T -

      - uses: actions/upload-artifact@v4
        with:
          name: generated-sources-visual
          path: generated-sources.tar.gz
          retention-days: 1

  visual-phone:
    runs-on: ubuntu-latest
    needs: generate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          cache: true

      - run: flutter pub get

      - uses: actions/download-artifact@v4
        with:
          name: generated-sources-visual

      - run: tar -xzf generated-sources.tar.gz

      - name: Run phone visual tests
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_7
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot-save
          disable-animations: true
          script: >
            flutter test integration_test/phone_test.dart
            --flavor phone
            ${{ inputs.update_goldens == true && '--update-goldens' || '' }}

      - name: Upload diff images on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: phone-golden-diffs
          path: integration_test/goldens/phone/
          retention-days: 7

      - name: Upload updated goldens
        if: inputs.update_goldens == true
        uses: actions/upload-artifact@v4
        with:
          name: phone-goldens
          path: integration_test/goldens/phone/
          retention-days: 30

  visual-tablet:
    runs-on: ubuntu-latest
    needs: generate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          cache: true

      - run: flutter pub get

      - uses: actions/download-artifact@v4
        with:
          name: generated-sources-visual

      - run: tar -xzf generated-sources.tar.gz

      - name: Run tablet visual tests
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_c
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot-save
          disable-animations: true
          script: >
            flutter test integration_test/tablet_test.dart
            --flavor phone
            ${{ inputs.update_goldens == true && '--update-goldens' || '' }}

      - name: Upload diff images on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: tablet-golden-diffs
          path: integration_test/goldens/tablet/
          retention-days: 7

      - name: Upload updated goldens
        if: inputs.update_goldens == true
        uses: actions/upload-artifact@v4
        with:
          name: tablet-goldens
          path: integration_test/goldens/tablet/
          retention-days: 30

  visual-watch:
    runs-on: ubuntu-latest
    needs: generate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          cache: true

      - run: flutter pub get

      - uses: actions/download-artifact@v4
        with:
          name: generated-sources-visual

      - run: tar -xzf generated-sources.tar.gz

      - name: Run watch visual tests
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: wearos_large_round
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot-save
          disable-animations: true
          script: >
            flutter test integration_test/wear_test.dart
            --flavor wear
            ${{ inputs.update_goldens == true && '--update-goldens' || '' }}

      - name: Upload diff images on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: watch-golden-diffs
          path: integration_test/goldens/watch/
          retention-days: 7

      - name: Upload updated goldens
        if: inputs.update_goldens == true
        uses: actions/upload-artifact@v4
        with:
          name: watch-goldens
          path: integration_test/goldens/watch/
          retention-days: 30
